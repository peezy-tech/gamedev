<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>{title}</title>
    <meta name="description" content="{desc}" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="{url}" />
    <meta property="og:title" content="{title}" />
    <meta property="og:description" content="{desc}" />
    <meta property="og:image" content="{image}" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="{url}" />
    <meta name="twitter:title" content="{title}" />
    <meta name="twitter:description" content="{desc}" />
    <meta name="twitter:image" content="{image}" />

    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="apple-touch-icon" sizes="57x57" href="{assetPrefix}apple-icon-57x57.png">
    <link rel="apple-touch-icon" sizes="60x60" href="{assetPrefix}apple-icon-60x60.png">
    <link rel="apple-touch-icon" sizes="72x72" href="{assetPrefix}apple-icon-72x72.png">
    <link rel="apple-touch-icon" sizes="76x76" href="{assetPrefix}apple-icon-76x76.png">
    <link rel="apple-touch-icon" sizes="114x114" href="{assetPrefix}apple-icon-114x114.png">
    <link rel="apple-touch-icon" sizes="120x120" href="{assetPrefix}apple-icon-120x120.png">
    <link rel="apple-touch-icon" sizes="144x144" href="{assetPrefix}apple-icon-144x144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="{assetPrefix}apple-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="{assetPrefix}apple-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="192x192"  href="{assetPrefix}android-icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="{assetPrefix}favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="{assetPrefix}favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="16x16" href="{assetPrefix}favicon-16x16.png">
    <!-- <link rel="manifest" href="{assetPrefix}manifest.json">
    <meta name="msapplication-TileColor" content="#ffffff">
    <meta name="msapplication-TileImage" content="{assetPrefix}ms-icon-144x144.png">
    <meta name="theme-color" content="#ffffff"> -->

    <link rel="preload" href="{assetPrefix}SpaceMono-regular.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="stylesheet" type="text/css" href="{assetPrefix}index.css?v={buildId}" />
    <script>
      window.PARTICLES_PATH = '{particlesPath}'
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script src="{assetPrefix}env.js?v={buildId}"></script>
    <script src="{jsPath}" type="module"></script>
  </body>
</html>
