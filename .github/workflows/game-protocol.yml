name: Game Protocol launch path

on:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:
  standalone-launch-path:
    runs-on: ubuntu-latest
    env:
      PUBLIC_API_URL: https://runtime.example/api
      PUBLIC_WS_URL: wss://runtime.example/ws
      PUBLIC_AUTH_URL: https://runtime.example/api/auth/identity
      PUBLIC_REQUIRE_WALLET_AUTH: "true"
      STANDALONE_WALLET_AUTH: "true"
      REQUIRE_WALLET_AUTH: "true"
      CORS_ORIGINS: https://games.example
      ASSETS: asset-service
      ASSETS_BASE_URL: https://runtime.example/assets
      ASSET_SERVICE_URL: http://asset-service:8787
      ASSET_SERVICE_API_KEY: ci-asset-service-key
      WORLD_ID: hl-world
      PORT: "3000"
      JWT_SECRET: ci-jwt-secret-with-enough-length
      STANDALONE_ADMIN_WALLETS: "0x1111111111111111111111111111111111111111"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate launch env contract
        run: npm run game-protocol:doctor -- --allow-placeholders

      - name: Build runtime
        run: npm run build

      - name: Build static client and runtime descriptor
        run: npm run game-protocol:build

      - name: Run focused launch-path tests
        run: |
          node --test --loader ./scripts/node-esm-loader.mjs \
            test/integration/assets-asset-service.test.js \
            test/integration/standalone-wallet-auth.test.js \
            test/integration/runtime-bootstrap.test.js
          node --test --loader ./scripts/node-esm-loader.mjs \
            --test-name-pattern "standalone wallet mode disables guest cli bootstrap" \
            test/integration/runtime-cli-auth.test.js

  runtime-control-launch-path:
    runs-on: ubuntu-latest
    env:
      PUBLIC_API_URL: https://placeholder-runtime.example/api
      PUBLIC_REQUIRE_WALLET_AUTH: "true"
      GAME_PROTOCOL_RUNTIME_KIND: authoritative-session
      GAME_PROTOCOL_RUNTIME_IMAGE: ghcr.io/load-game/gamedev@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      GAME_PROTOCOL_RUNTIME_CAPACITY: "50"
      GAME_PROTOCOL_RUNTIME_REGIONS: use
      GAME_PROTOCOL_RUNTIME_BOOTSTRAP_MODE: push
      GAME_PROTOCOL_RUNTIME_WORLD_ID: hl-world
      GAME_PROTOCOL_RUNTIME_WORLD_SLUG: hl-world
      GAME_PROTOCOL_RUNTIME_DB_SCHEMA: hl_world
      GAME_PROTOCOL_RUNTIME_ENV: '{"ASSETS":"s3","ASSETS_BASE_URL":"https://assets.load.game","SAVE_INTERVAL":"60","STANDALONE_WALLET_AUTH":"true","REQUIRE_WALLET_AUTH":"true","PUBLIC_REQUIRE_WALLET_AUTH":"true","CORS_ORIGINS":"https://games.example","HYPERLIQUID_DATA_URL":"https://staging.peezy.tech/devnet/hyperliquid"}'
      GAME_PROTOCOL_RUNTIME_SECRET_ENV: '[{"name":"DB_URI","secretName":"lobby-db-uri","secretKey":"uri"},{"name":"ASSETS_S3_URI","secretName":"lobby-assets-s3","secretKey":"uri"},{"name":"JWT_SECRET","secretName":"lobby-jwt","secretKey":"secret"},{"name":"STANDALONE_ADMIN_WALLETS","secretName":"lobby-admin-wallets","secretKey":"wallets"}]'
      GAME_PROTOCOL_RUNTIME_KUBERNETES: '{"imagePullSecrets":["ghcr-secret"],"nodeSelector":{"lobby/pool":"gs"},"resources":{"requests":{"cpu":"100m","memory":"256Mi"},"limits":{"cpu":"1","memory":"1Gi"}},"tlsSecret":{"name":"gameserver-wildcard-tls"}}'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate runtime-control launch env contract
        run: npm run game-protocol:doctor -- --allow-placeholders

      - name: Build static client
        run: npm run static:build

      - name: Write runtime-control descriptor
        run: npm run game-protocol:runtime

      - name: Check generated runtime-control descriptor
        run: |
          node -e "const fs = require('fs'); const d = JSON.parse(fs.readFileSync('build/static/runtime.json', 'utf8')); if (d.kind !== 'authoritative-session') throw new Error('expected authoritative-session descriptor'); if (d.server.bootstrap?.mode !== 'push') throw new Error('expected push bootstrap'); if (d.server.env?.PUBLIC_API_URL || d.server.env?.PUBLIC_WS_URL || d.server.env?.PUBLIC_AUTH_URL) throw new Error('managed runtime env must not hardcode public endpoint URLs');"

      - name: Run focused runtime-control launch-path tests
        run: |
          node --test --loader ./scripts/node-esm-loader.mjs \
            test/integration/game-protocol-env.test.js \
            test/integration/game-protocol-runtime-descriptor.test.js \
            test/integration/hl-world-runbook.test.js
          node --test test/integration/client-runtime-connection.test.js
          node --test --loader ./scripts/node-esm-loader.mjs \
            test/integration/agones-sdk-http.test.js \
            test/integration/agones-player-tracking.test.js \
            test/integration/agones-idle-shutdown.test.js \
            test/integration/runtime-startup.test.js
          node --test --loader ./scripts/node-esm-loader.mjs \
            --test-name-pattern "runtime-control Agones TLS shape|runtime accepts bootstrap push" \
            test/integration/runtime-standby-bootstrap.test.js
