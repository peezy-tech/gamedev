name: Publish npm package

permissions:
  contents: read
  id-token: write

on:
#   push:
#     tags:
#       - "v*.*.*"
  workflow_dispatch:

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    # Only require the npm environment when we are publishing a real release tag.
    environment: ${{ startsWith(github.ref, 'refs/tags/v') && 'npm' || '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Install dependencies
        run: bun ci

      - name: Check package metadata
        id: pkg
        run: |
          PACKAGE_NAME=$(bun --eval "const pkg = JSON.parse(await Bun.file('package.json').text()); process.stdout.write(pkg.name)")
          PACKAGE_VERSION=$(bun --eval "const pkg = JSON.parse(await Bun.file('package.json').text()); process.stdout.write(pkg.version)")
          echo "name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Package: $PACKAGE_NAME@$PACKAGE_VERSION"

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [[ "$TAG_VERSION" != "${{ steps.pkg.outputs.version }}" ]]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version (${{ steps.pkg.outputs.version }})."
            exit 1
          fi

      - name: Publish package to npm
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun publish --access public

      - name: Dry run publish (branch push/manual)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: bun publish --dry-run
