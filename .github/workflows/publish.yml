name: Publish npm package

permissions:
  contents: read
  id-token: write

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: npm-publish
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.4

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24
          cache: true

      - name: Update npm
        run: npm install -g npm@^11.10.0

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Check package metadata
        id: pkg
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Package: $PACKAGE_NAME@$PACKAGE_VERSION"

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [[ "$TAG_VERSION" != "${{ steps.pkg.outputs.version }}" ]]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version (${{ steps.pkg.outputs.version }})."
            exit 1
          fi

      - name: Publish package to npm
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          unset NODE_AUTH_TOKEN NPM_CONFIG_USERCONFIG
          npm publish --provenance --access public

      - name: Dry run publish (branch push/manual)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npm publish --dry-run --no-git-checks
