name: Publish npm package

permissions:
  contents: read
  id-token: write

on:
#   push:
#     tags:
#       - "v*.*.*"
  workflow_dispatch:

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    # Only require the npm environment when we are publishing a real release tag.
    environment: ${{ startsWith(github.ref, 'refs/tags/v') && 'npm' || '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check package metadata
        id: pkg
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Package: $PACKAGE_NAME@$PACKAGE_VERSION"

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [[ "$TAG_VERSION" != "${{ steps.pkg.outputs.version }}" ]]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version (${{ steps.pkg.outputs.version }})."
            exit 1
          fi

      - name: Publish package to npm
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry run publish (branch push/manual)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npm publish --dry-run --no-git-checks
