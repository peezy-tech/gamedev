name: Publish npm package

permissions:
  contents: read
  id-token: write

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: npm-publish
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.4

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24
          cache: true

      - name: Update npm
        run: npm install -g npm@^11.10.0

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Check package metadata
        id: pkg
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Package: $PACKAGE_NAME@$PACKAGE_VERSION"

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [[ "$TAG_VERSION" != "${{ steps.pkg.outputs.version }}" ]]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version (${{ steps.pkg.outputs.version }})."
            exit 1
          fi

      - name: Check trusted publishing context
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "node=$(node --version)"
          echo "npm=$(npm --version)"
          echo "package_repository_url=$(node -p 'require("./package.json").repository.url')"
          echo "github_repository=${GITHUB_REPOSITORY}"
          echo "github_ref=${GITHUB_REF}"
          echo "github_workflow_ref=${GITHUB_WORKFLOW_REF}"
          echo "runner_environment=${RUNNER_ENVIRONMENT:-}"

          node --input-type=module <<'NODE'
          const requestUrl = process.env.ACTIONS_ID_TOKEN_REQUEST_URL;
          const requestToken = process.env.ACTIONS_ID_TOKEN_REQUEST_TOKEN;

          if (!requestUrl || !requestToken) {
            throw new Error('GitHub OIDC request environment is not available');
          }

          const url = new URL(requestUrl);
          url.searchParams.set('audience', 'npm:registry.npmjs.org');

          const response = await fetch(url, {
            headers: {
              Authorization: `Bearer ${requestToken}`,
            },
          });

          if (!response.ok) {
            throw new Error(`Failed to request GitHub OIDC token: ${response.status} ${response.statusText}`);
          }

          const { value } = await response.json();
          const [, encodedPayload] = value.split('.');
          const payload = JSON.parse(Buffer.from(encodedPayload, 'base64url').toString('utf8'));
          const keys = [
            'iss',
            'aud',
            'sub',
            'repository',
            'repository_owner',
            'ref',
            'workflow',
            'workflow_ref',
            'job_workflow_ref',
            'environment',
            'runner_environment',
            'event_name',
            'sha',
          ];

          console.log('oidc_token_available=true');
          for (const key of keys) {
            if (Object.hasOwn(payload, key)) {
              const value = Array.isArray(payload[key]) ? payload[key].join(',') : payload[key];
              console.log(`oidc_${key}=${value}`);
            }
          }
          NODE

      - name: Publish package to npm
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          unset NODE_AUTH_TOKEN NPM_CONFIG_USERCONFIG
          npm publish --provenance --access public

      - name: Dry run publish (branch push/manual)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npm publish --dry-run --no-git-checks
