name: Build docker image
permissions:
  packages: write
  contents: read

on:
  push:
    branches:
      - 'main'
      - 'dev'
      - 'auth'
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{github.repository}}
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=sha,format=long
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        id: runtime_image
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            COMMIT_HASH=${{ github.sha }}

      - name: Summarize published runtime image digest
        run: |
          {
            echo "### gamedev runtime image"
            echo "- image: \`ghcr.io/${{ github.repository }}\`"
            echo "- digest: \`ghcr.io/${{ github.repository }}@${{ steps.runtime_image.outputs.digest }}\`"
            echo ""
            echo "Use this digest for runtime-control releases:"
            echo "\`\`\`bash"
            echo "GAME_PROTOCOL_RUNTIME_IMAGE=ghcr.io/${{ github.repository }}@${{ steps.runtime_image.outputs.digest }}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
